server {
    listen 80;
    server_name cweli.com www.cweli.com;
    return 301 https://cweli.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.cweli.com;

    ssl_certificate     /etc/letsencrypt/live/cweli.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cweli.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cweli.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cweli.com;

    ssl_certificate     /etc/letsencrypt/live/cweli.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cweli.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/cweli;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long durée pour les assets hashés (Angular outputHashing: all)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker : pas de cache pour ne pas bloquer les mises à jour
    location = /ngsw-worker.js {
        expires off;
        add_header Cache-Control "no-store";
    }
    location = /ngsw.json {
        expires off;
        add_header Cache-Control "no-store";
    }

    # Proxy API vers le backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — toutes les routes Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
