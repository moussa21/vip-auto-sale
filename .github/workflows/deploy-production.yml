name: Deploy — Frontend Production

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build production
        run: npm run build -- --configuration production

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/vip-auto-sale/browser
          retention-days: 1

  deploy:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Upload vers VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ secrets.PROD_VPS_PORT }}
          source: "frontend-dist/*"
          target: "/var/www/cweli/"
          strip_components: 1

      - name: Recharger Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ secrets.PROD_VPS_PORT }}
          script: |
            chown -R www-data:www-data /var/www/cweli
            nginx -t && systemctl reload nginx
            echo "Frontend cweli.com déployé — $(date)"
