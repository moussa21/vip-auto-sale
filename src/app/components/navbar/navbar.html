<nav class="navbar" [class.scrolled]="scrolled">
  <div class="container nav-inner">
    <a routerLink="/" class="brand">
      <span class="brand-icon">&#9670;</span>
      <span class="brand-text"><span class="accent"> CWeli</span></span>
    </a>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Accueil</a></li>
      <li><a routerLink="/" fragment="catalogue">Catalogue</a></li>
    </ul>

    <div class="nav-actions">
      <ng-container *ngIf="auth.isLoggedIn; else guestActions">
        <a routerLink="/annonces/nouveau" class="btn btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Déposer une annonce
        </a>
        <button class="btn btn-ghost btn-sm" (click)="auth.logout()">Déconnexion</button>
      </ng-container>
      <ng-template #guestActions>
        <a routerLink="/annonces/nouveau" class="btn btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Déposer une annonce
        </a>
      </ng-template>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Menu">
      <span [class.open]="menuOpen"></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen" (click)="menuOpen=false">
    <a routerLink="/">Accueil</a>
    <a routerLink="/" fragment="catalogue">Catalogue</a>
    <a routerLink="/annonces/nouveau">Déposer une annonce</a>
    <a *ngIf="auth.isLoggedIn" (click)="auth.logout()">Déconnexion</a>
  </div>
</nav>
