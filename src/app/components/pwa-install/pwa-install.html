<div *ngIf="showBanner" class="pwa-banner" role="dialog" aria-label="Installer l'application">
  <div class="pwa-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <line x1="12" y1="18" x2="12" y2="18.01"/>
    </svg>
  </div>
  <div class="pwa-text">
    <strong>Installer CWeli</strong>
    <span>Accédez rapidement depuis votre écran d'accueil</span>
  </div>
  <div class="pwa-actions">
    <button class="btn btn-primary btn-sm" (click)="install()">Installer</button>
    <button class="btn-close" (click)="dismiss()" aria-label="Fermer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>
