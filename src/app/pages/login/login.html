<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <a routerLink="/" class="brand">
        <span>&#9670;</span> VIP<span class="accent"> Auto</span>
      </a>
      <h1>Connexion</h1>
      <p>Connectez-vous pour déposer une annonce.</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div *ngIf="error" class="form-error">{{ error }}</div>

      <div class="field">
        <label for="identifiant">Identifiant</label>
        <input id="identifiant" type="text" [(ngModel)]="identifiant" name="identifiant"
               placeholder="votre identifiant" autocomplete="username" />
      </div>

      <div class="field">
        <label for="pwd">Mot de passe</label>
        <input id="pwd" type="password" [(ngModel)]="motDePasse" name="motDePasse"
               placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        <svg *ngIf="loading" class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/mot-de-passe-oublie" class="auth-link">Mot de passe oublié ?</a>
      <span class="auth-sep">•</span>
      <span class="auth-text">Pas encore de compte ?</span>
      <a routerLink="/inscription" class="auth-link accent">Créer un compte</a>
    </div>

    <a routerLink="/" class="back-link">← Retour à l'accueil</a>
  </div>
</div>
