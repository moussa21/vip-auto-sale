<div class="create-page">
  <div class="container">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="section-title">Déposer une annonce</h1>
        <p class="page-sub">Remplissez les informations de votre véhicule.</p>
      </div>
      <div class="header-actions">
        <a routerLink="/" class="btn btn-ghost">← Accueil</a>
        <button type="button" class="btn btn-outline" (click)="logout()">Déconnexion</button>
      </div>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="success-banner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Annonce publiée avec succès ! Redirection en cours…
    </div>

    <form *ngIf="!success" class="create-form" (ngSubmit)="submit()">

      <!-- Photos Section -->
      <section class="form-section">
        <h2 class="section-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Photos du véhicule
        </h2>
        <p class="section-hint">La première photo sera la photo de couverture. Jusqu'à 8 photos.</p>
        <app-photo-uploader (photosChange)="onPhotosChange($event)"></app-photo-uploader>
      </section>

      <!-- Vehicle Info -->
      <section class="form-section">
        <h2 class="section-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h5l2 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Informations du véhicule
        </h2>

        <div class="fields-grid">
          <div class="field">
            <label>Marque *</label>
            <input type="text" [(ngModel)]="form.marque" name="marque" placeholder="Ex: Toyota" />
          </div>
          <div class="field">
            <label>Modèle *</label>
            <input type="text" [(ngModel)]="form.modele" name="modele" placeholder="Ex: Corolla" />
          </div>
          <div class="field">
            <label>Année</label>
            <input type="number" [(ngModel)]="form.annee" name="annee" [min]="1990" [max]="currentYear" />
          </div>
          <div class="field">
            <label>Kilométrage</label>
            <div class="input-suffix">
              <input type="number" [(ngModel)]="form.kilometrage" name="kilometrage" min="0" placeholder="0" />
              <span>km</span>
            </div>
          </div>
          <div class="field">
            <label>Carburant</label>
            <select [(ngModel)]="form.carburant" name="carburant">
              <option value="">— Choisir —</option>
              <option *ngFor="let c of carburants" [value]="c">{{ c }}</option>
            </select>
          </div>
          <div class="field">
            <label>Transmission</label>
            <select [(ngModel)]="form.transmission" name="transmission">
              <option value="">— Choisir —</option>
              <option *ngFor="let t of transmissions" [value]="t">{{ t }}</option>
            </select>
          </div>
        </div>

        <div class="field full">
          <label>Description</label>
          <textarea [(ngModel)]="form.description" name="description" rows="4"
                    placeholder="État général, options, historique d'entretien…"></textarea>
        </div>
      </section>

      <!-- Price -->
      <section class="form-section">
        <h2 class="section-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Prix
        </h2>
        <div class="fields-grid">
          <div class="field">
            <label>Prix (GNF) *</label>
            <div class="input-suffix">
              <input type="number" [(ngModel)]="form.prix" name="prix" min="0" placeholder="0" />
              <span>GNF</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Submit -->
      <div class="submit-area">
        <div *ngIf="error" class="form-error">{{ error }}</div>

        <div *ngIf="uploading" class="progress-bar-wrap">
          <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <span>Publication en cours…</span>
        </div>

        <button type="submit" class="btn btn-primary submit-btn" [disabled]="uploading">
          <svg *ngIf="uploading" class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          {{ uploading ? 'Publication…' : 'Publier l\'annonce' }}
        </button>
      </div>

    </form>
  </div>
</div>
