<div class="reg-page">
  <div class="reg-card">

    <div class="reg-header">
      <a routerLink="/" class="brand">
        <span>&#9670;</span><span class="accent"> CWeli</span>
      </a>
      <h1>Créer un compte</h1>
      <p>Déposez vos annonces de véhicules gratuitement.</p>
    </div>

    <!-- Profile type -->
    <div class="profile-toggle">
      <button type="button"
              class="profile-btn"
              [class.active]="profileType === 'particulier'"
              (click)="setProfile('particulier')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Particulier
      </button>
      <button type="button"
              class="profile-btn"
              [class.active]="profileType === 'professionnel'"
              (click)="setProfile('professionnel')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Professionnel
      </button>
    </div>

    <form class="reg-form" (ngSubmit)="submit()">
      <div *ngIf="error" class="form-error">{{ error }}</div>

      <!-- Nom entreprise (professionnel only) -->
      <div class="field" *ngIf="profileType === 'professionnel'">
        <label>Nom de l'entreprise / garage *</label>
        <input type="text" [(ngModel)]="nomEntreprise" name="nomEntreprise"
               placeholder="Ex : Auto Services Conakry" />
      </div>

      <div class="field-row">
        <div class="field">
          <label>Prénom *</label>
          <input type="text" [(ngModel)]="prenom" name="prenom"
                 placeholder="Votre prénom" autocomplete="given-name" />
        </div>
        <div class="field">
          <label>Nom *</label>
          <input type="text" [(ngModel)]="nom" name="nom"
                 placeholder="Votre nom" autocomplete="family-name" />
        </div>
      </div>

      <!-- Identifiant -->
      <div class="field">
        <label>Identifiant (login) *</label>
        <div class="input-status-wrap">
          <input type="text" [(ngModel)]="identifiant" name="identifiant"
                 placeholder="min. 3 caractères"
                 autocomplete="username"
                 [class.input-ok]="identifiantStatus === 'ok'"
                 [class.input-err]="identifiantStatus === 'taken'"
                 (ngModelChange)="onIdentifiantChange($event)" />
          <span class="status-icon" *ngIf="identifiantStatus === 'checking'">
            <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
          <span class="status-icon ok" *ngIf="identifiantStatus === 'ok'">✓</span>
          <span class="status-icon err" *ngIf="identifiantStatus === 'taken'">✗</span>
        </div>
        <span class="field-hint err" *ngIf="identifiantStatus === 'taken'">Identifiant déjà utilisé</span>
        <span class="field-hint ok" *ngIf="identifiantStatus === 'ok'">Identifiant disponible</span>
      </div>

      <!-- Téléphone -->
      <div class="field">
        <label>Numéro de téléphone *</label>
        <input type="tel" [(ngModel)]="telephone" name="telephone"
               placeholder="Ex : +224 624 00 00 00"
               autocomplete="tel" />
        <span class="field-hint">Utilisé pour récupérer votre mot de passe.</span>
      </div>

      <!-- Adresse -->
      <div class="field">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="adresse" name="adresse"
               placeholder="Quartier, rue…" autocomplete="street-address" />
      </div>

      <!-- Ville + Pays -->
      <div class="field-row">
        <div class="field city-field">
          <label>Ville</label>
          <div class="city-wrap">
            <input type="text" [(ngModel)]="ville" name="ville"
                   placeholder="Votre ville"
                   autocomplete="off"
                   (ngModelChange)="onCityInput()"
                   (blur)="closeCitySuggestions()" />
            <ul class="city-dropdown" *ngIf="showCitySuggestions">
              <li *ngFor="let city of citySuggestions"
                  (mousedown)="selectCity(city)">{{ city }}</li>
            </ul>
          </div>
        </div>
        <div class="field">
          <label>Pays</label>
          <input type="text" [(ngModel)]="pays" name="pays"
                 placeholder="Pays" autocomplete="country-name" />
        </div>
      </div>

      <!-- Email (optional) -->
      <div class="field">
        <label>Email <span class="optional">(optionnel)</span></label>
        <input type="email" [(ngModel)]="email" name="email"
               placeholder="votre@email.com" autocomplete="email" />
      </div>

      <!-- Mot de passe -->
      <div class="field">
        <label>Mot de passe *</label>
        <div class="pwd-wrap">
          <input [type]="showPwd ? 'text' : 'password'"
                 [(ngModel)]="motDePasse" name="motDePasse"
                 placeholder="min. 4 caractères"
                 autocomplete="new-password" />
          <button type="button" class="pwd-toggle" (click)="showPwd = !showPwd"
                  [attr.aria-label]="showPwd ? 'Masquer' : 'Afficher'">
            <svg *ngIf="!showPwd" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPwd"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label>Confirmer le mot de passe *</label>
        <div class="pwd-wrap">
          <input [type]="showConfPwd ? 'text' : 'password'"
                 [(ngModel)]="confirmation" name="confirmation"
                 placeholder="Répétez le mot de passe"
                 autocomplete="new-password" />
          <button type="button" class="pwd-toggle" (click)="showConfPwd = !showConfPwd"
                  [attr.aria-label]="showConfPwd ? 'Masquer' : 'Afficher'">
            <svg *ngIf="!showConfPwd" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showConfPwd"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        <svg *ngIf="loading" class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        {{ loading ? 'Création en cours…' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="auth-links">
      <span class="auth-text">Déjà un compte ?</span>
      <a routerLink="/connexion" class="auth-link accent">Se connecter</a>
    </div>

    <a routerLink="/" class="back-link">← Retour à l'accueil</a>
  </div>
</div>
